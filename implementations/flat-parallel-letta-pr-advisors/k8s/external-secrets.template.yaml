# External Secrets template for Doppler
#
# This is a template, not directly deployable until the Doppler auth Secret/SecretStore
# is aligned with the cluster's standard External Secrets Operator setup.
# Do not place Doppler tokens directly in this file.

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: doppler-codingagents
  namespace: ai-agents
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-codingagents
            key: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: letta-secrets
  namespace: ai-agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-codingagents
    kind: SecretStore
  target:
    name: letta-secrets
    creationPolicy: Owner
  data:
    - secretKey: letta-api-key
      remoteRef:
        key: LETTA_API_KEY
    # Add LETTA_SERVER_PASSWORD, LETTA_PG_URI, and OPENAI_API_KEY once they exist
    # in the chosen Doppler project/config or are referenced from project-specific stores.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: doppler-search-tools
  namespace: ai-agents
spec:
  provider:
    doppler:
      auth:
        secretRef:
          dopplerToken:
            name: doppler-token-search-tools
            key: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web-search-secrets
  namespace: ai-agents
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-search-tools
    kind: SecretStore
  target:
    name: web-search-secrets
    creationPolicy: Owner
  data:
    - secretKey: exa-api-key
      remoteRef:
        key: EXA_API_KEY
    - secretKey: firecrawl-api-key
      remoteRef:
        key: FIRECRAWL_API_KEY