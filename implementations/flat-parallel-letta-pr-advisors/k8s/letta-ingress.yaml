apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: letta-api-ingress
  namespace: ai-agents
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - letta.yourdomain.com
      secretName: letta-tls
  rules:
    - host: letta.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: letta-server
                port:
                  number: 8283